<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sorry ❤️</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
    text-align: center;
    overflow: hidden;
}

/* Teddy */
.teddy {
    position: absolute;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 120px;
    animation: fall 3s ease forwards;
}

/* Text */
#text {
    position: absolute;
    top: 55%;
    width: 100%;
    font-size: 24px;
    line-height: 1.6;
    opacity: 0;
}

/* Final love */
#love {
    position: absolute;
    top: 75%;
    width: 100%;
    font-size: 40px;
    color: #ff4b5c;
    opacity: 0;
    text-shadow: 0 0 15px #ff4b5c;
}

/* Animations */
@keyframes fall {
    to { top: 25%; }
}

@keyframes fade {
    to { opacity: 1; }
}

/* Hearts falling */
.heart {
    position: absolute;
    color: #ff4b5c;
    animation: move 5s linear infinite;
}

@keyframes move {
    0% { transform: translateY(0); opacity:1; }
    100% { transform: translateY(800px); opacity:0; }
}
</style>

</head>

<body>

<div class="teddy">🧸</div>

<div id="text"></div>
<div id="love">LOVE YOU KARTHIK ❤️</div>

<script>

const lines = [
"SORRY KARTHIK… 💔",
"I know I hurt you…",
"And I hate myself for that…",
"You are not just someone to me…",
"You are my everything…",
"I miss you… more than you think…",
"Please don’t go away… 🥺"
];

let i = 0;

function showLines() {
    const textDiv = document.getElementById("text");
    textDiv.style.animation = "fade 2s forwards";

    let interval = setInterval(() => {
        if (i < lines.length) {
            textDiv.innerHTML += lines[i] + "<br>";
            i++;
        } else {
            clearInterval(interval);

            // Show love text after pause
            setTimeout(() => {
                document.getElementById("love").style.animation = "fade 3s forwards";
            }, 2000);
        }
    }, 1500);
}

setTimeout(showLines, 3000);

// hearts
function createHeart() {
    const h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "❤️";
    h.style.left = Math.random() * 100 + "vw";
    h.style.fontSize = (10 + Math.random() * 20) + "px";
    document.body.appendChild(h);

    setTimeout(() => h.remove(), 5000);
}
setInterval(createHeart, 300);

</script>

</body>
</html>
